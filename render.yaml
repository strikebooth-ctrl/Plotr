services:
  - type: web
    name: plotr-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: plotr-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /tmp/uploads

databases:
  - name: plotr-db
    plan: free
